<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jobtide — Construction Project Intelligence</title>
<meta name="description" content="A two-sided network for the construction trades. Find projects to bid. Get visibility on jobs that need your products.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ============ DESIGN SYSTEM ============ */
:root{
  --bg:#f7f7f5; --surface:#ffffff; --surface2:#f2f2f0; --surface3:#eaeae7;
  --border:#e4e4e0; --border2:#d0d0cb;
  --text:#0f0f0f; --text2:#3d3d3d; --text3:#7a7a7a; --text4:#b0b0b0;
  --accent:#0f0f0f;
  --pro:#1a56db; --pro-bg:#eff4ff; --pro-border:#c3d5f8;
  --urgent:#c93535; --warn:#b86b0a; --ok:#1e7d52;
  --bidding:#b86b0a; --speccing:#1a56db; --distributing:#7c3aed; --repping:#1e7d52;
  --shadow:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.06);
  --nav-h:60px; --bottom-nav-h:62px; --maxw:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--text);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:inherit;text-decoration:none}
.mono{font-family:'JetBrains Mono',monospace}
.hidden{display:none!important}

/* ============ BUTTONS ============ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:9px 16px;border-radius:8px;font-weight:600;font-size:14px;
  transition:.15s ease;white-space:nowrap;border:1px solid transparent;line-height:1}
.btn:active{transform:translateY(1px)}
.btn-dark{background:var(--accent);color:#fff}
.btn-dark:hover{background:#262626}
.btn-light{background:var(--surface);color:var(--text);border-color:var(--border2)}
.btn-light:hover{background:var(--surface2)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-pro{background:var(--pro);color:#fff}
.btn-pro:hover{background:#1647b8}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-lg{padding:13px 24px;font-size:16px}
.btn-block{width:100%}
.btn-google{background:#fff;color:var(--text);border:1px solid var(--border2);font-weight:600}
.btn-google:hover{background:var(--surface2)}

/* ============ NAV ============ */
.topnav{position:sticky;top:0;z-index:50;height:var(--nav-h);background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center}
.topnav-inner{max-width:var(--maxw);margin:0 auto;width:100%;padding:0 20px;display:flex;align-items:center;gap:16px}
.wordmark{font-weight:900;letter-spacing:-.6px;font-size:21px;color:var(--text);cursor:pointer}
.navsearch{flex:1;max-width:420px;position:relative}
.navsearch input{width:100%;padding:8px 14px 8px 36px;border:1px solid var(--border2);
  border-radius:8px;background:var(--surface2);outline:none}
.navsearch input:focus{background:#fff;border-color:var(--border2);box-shadow:0 0 0 3px rgba(15,15,15,.05)}
.navsearch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text4)}
.nav-spacer{flex:1}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-link{padding:8px 12px;border-radius:8px;font-weight:500;color:var(--text2);font-size:14px}
.nav-link:hover{background:var(--surface2);color:var(--text)}
.nav-link.active{color:var(--text);font-weight:600}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer}

/* ============ LAYOUT ============ */
.page{max-width:var(--maxw);margin:0 auto;padding:24px 20px 40px}
.page-narrow{max-width:760px}
.feed-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
.main-col{min-width:0}
.sidebar{position:sticky;top:calc(var(--nav-h) + 24px);display:flex;flex-direction:column;gap:16px}

/* ============ CARDS ============ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.card-pad{padding:18px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px;cursor:pointer;transition:.15s ease}
.proj-card:hover{border-color:var(--border2);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.proj-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
.proj-name{font-weight:700;font-size:16.5px;letter-spacing:-.2px;line-height:1.3}
.proj-meta{display:flex;flex-wrap:wrap;gap:6px 14px;color:var(--text3);font-size:13.5px;margin-bottom:11px;align-items:center}
.proj-meta b{color:var(--text2);font-weight:600}
.csi-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px}
.csi-tag{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;padding:3px 7px;color:var(--text2);font-weight:500}
.csi-tag.clk{cursor:pointer}.csi-tag.clk:hover{background:var(--surface3);border-color:var(--border2)}
.csi-more{font-size:12px;color:var(--text3);padding:3px 4px}
.proj-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border)}
.foot-stat{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:5px}
.foot-stat b{color:var(--text2)}
.foot-spacer{flex:1}

/* ============ BADGES / PILLS ============ */
.bidpill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:12.5px;font-weight:600;white-space:nowrap}
.bidpill.urgent{background:#fbeaea;color:var(--urgent)}
.bidpill.warn{background:#fdf3e3;color:var(--warn)}
.bidpill.ok{background:#e6f4ec;color:var(--ok)}
.bidpill.neutral{background:var(--surface2);color:var(--text3)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;
  font-size:12px;font-weight:600;border:1px solid var(--border2);background:var(--surface2);color:var(--text2)}
.badge.public{background:#eef5fb;border-color:#cfe1f1;color:#1f5d8c}
.badge.federal{background:#f3eefb;border-color:#ddd0f1;color:#6b3fb0}
.badge.private{background:#f1f1ef;border-color:var(--border2);color:var(--text2)}
.badge.verified{background:#e6f4ec;border-color:#bfe2cf;color:var(--ok)}
.badge.pro{background:var(--pro-bg);border-color:var(--pro-border);color:var(--pro)}
.role-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;
  font-size:12px;font-weight:600;border:1px solid}
.role-pill.Bidding{color:var(--bidding);border-color:#e8c89a;background:#fdf6ea}
.role-pill.Speccing{color:var(--speccing);border-color:var(--pro-border);background:var(--pro-bg)}
.role-pill.Distributing{color:var(--distributing);border-color:#d9c8f5;background:#f6f1fe}
.role-pill.Repping{color:var(--repping);border-color:#bfe2cf;background:#e9f5ee}

/* ============ AVATARS ============ */
.avatars{display:flex}
.av{width:26px;height:26px;border-radius:50%;background:var(--surface3);border:2px solid var(--surface);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);margin-left:-7px}
.av:first-child{margin-left:0}
.av.b{background:#fdf6ea;color:var(--bidding)}.av.s{background:var(--pro-bg);color:var(--speccing)}
.av.d{background:#f6f1fe;color:var(--distributing)}.av.r{background:#e9f5ee;color:var(--repping)}

/* ============ CHIPS / FILTERS ============ */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.chip{padding:7px 14px;border-radius:20px;font-size:13.5px;font-weight:600;
  border:1px solid var(--border2);background:var(--surface);color:var(--text2);white-space:nowrap;transition:.12s}
.chip:hover{border-color:var(--text3)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ============ FEED HEADER ============ */
.feed-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.feed-title{font-size:22px;font-weight:800;letter-spacing:-.4px}
.feed-title span{color:var(--text3);font-weight:500;font-size:15px;margin-left:8px}

/* ============ SIDEBAR WIDGETS ============ */
.widget{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.widget-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:12px}
.pulse-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.pulse-row:last-child{border-bottom:none}
.pulse-row b{font-weight:700}
.mt-item{display:flex;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:13.5px}
.mt-item:last-child{border-bottom:none}
.mt-item:hover .mt-name{color:var(--pro)}
.mt-name{font-weight:600;line-height:1.3}
.mt-count{color:var(--text3);white-space:nowrap;font-size:12.5px}

/* ============ HERO / LANDING ============ */
.hero{text-align:center;padding:72px 20px 56px;max-width:860px;margin:0 auto}
.hero h1{font-size:54px;font-weight:900;letter-spacing:-1.8px;line-height:1.04;margin-bottom:20px}
.hero p{font-size:19px;color:var(--text2);max-width:600px;margin:0 auto 30px;line-height:1.5}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:42px}
.social-proof{display:flex;gap:42px;justify-content:center;flex-wrap:wrap}
.sp-item{text-align:center}
.sp-num{font-size:30px;font-weight:900;letter-spacing:-.6px}
.sp-label{font-size:13px;color:var(--text3);font-weight:500;margin-top:2px}
.section{max-width:var(--maxw);margin:0 auto;padding:56px 20px}
.section-head{text-align:center;margin-bottom:40px}
.section-head h2{font-size:34px;font-weight:800;letter-spacing:-.8px;margin-bottom:10px}
.section-head p{font-size:17px;color:var(--text3)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:var(--shadow)}
.feat-icon{width:44px;height:44px;border-radius:11px;background:var(--surface2);display:flex;align-items:center;
  justify-content:center;margin-bottom:16px;font-size:20px}
.feat-card h3{font-size:18.5px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.feat-card p{color:var(--text2);font-size:14.5px;line-height:1.55}
.feat-card ul{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:9px}
.feat-card li{display:flex;gap:9px;align-items:flex-start;font-size:14.5px;color:var(--text2)}
.feat-card li svg{flex-shrink:0;margin-top:3px;color:var(--ok)}
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
.price-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:var(--shadow);position:relative}
.price-card.featured{border-color:var(--pro);box-shadow:0 8px 28px rgba(26,86,219,.14);border-width:1.5px}
.price-tag-top{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--pro);color:#fff;
  font-size:11.5px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.price-name{font-size:16px;font-weight:700;margin-bottom:6px}
.price-amt{font-size:40px;font-weight:900;letter-spacing:-1px;line-height:1}
.price-amt small{font-size:15px;font-weight:600;color:var(--text3);letter-spacing:0}
.price-sub{color:var(--text3);font-size:14px;margin:8px 0 20px}
.price-card ul{list-style:none;display:flex;flex-direction:column;gap:11px;margin-bottom:24px}
.price-card li{display:flex;gap:9px;font-size:14px;color:var(--text2);align-items:flex-start}
.price-card li svg{flex-shrink:0;margin-top:3px;color:var(--ok)}
.footer{background:var(--surface);border-top:1px solid var(--border);padding:44px 20px;margin-top:40px}
.footer-inner{max-width:var(--maxw);margin:0 auto;display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap}
.footer-tag{color:var(--text3);font-size:14px;max-width:280px;margin-top:8px}
.footer-links{display:flex;gap:48px;flex-wrap:wrap}
.footer-col h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:12px}
.footer-col a{display:block;color:var(--text2);font-size:14px;padding:4px 0;cursor:pointer}
.footer-col a:hover{color:var(--text)}

/* ============ PROJECT PAGE ============ */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-weight:600;font-size:14px;margin-bottom:16px;padding:6px 0}
.back-btn:hover{color:var(--text)}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;box-shadow:var(--shadow-lg);margin-bottom:20px}
.hc-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.hc-title{font-size:28px;font-weight:800;letter-spacing:-.6px;line-height:1.15;margin-bottom:16px}
.hc-layout{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.hc-body{flex:1;min-width:260px}
.tracker-box{text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px 26px;min-width:120px}
.tracker-box .n{font-size:34px;font-weight:900;letter-spacing:-1px;line-height:1}
.tracker-box .l{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
.meta-row{display:flex;flex-wrap:wrap;gap:8px 22px;margin:16px 0;color:var(--text2);font-size:14.5px}
.meta-row .mi{display:flex;align-items:center;gap:7px}
.meta-row .mi b{font-weight:700}
.hc-desc{color:var(--text2);font-size:15px;line-height:1.6;margin:14px 0 18px}
.hc-actions{display:flex;gap:10px;flex-wrap:wrap}
.role-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
.role-row-label{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:11px}
.role-choices{display:flex;gap:9px;flex-wrap:wrap}
.role-choice{padding:8px 15px;border-radius:20px;font-size:13.5px;font-weight:600;border:1.5px solid var(--border2);
  background:var(--surface);color:var(--text2);transition:.12s}
.role-choice:hover{border-color:var(--text3)}
.role-choice.sel.Bidding{background:#fdf6ea;border-color:var(--bidding);color:var(--bidding)}
.role-choice.sel.Speccing{background:var(--pro-bg);border-color:var(--speccing);color:var(--speccing)}
.role-choice.sel.Distributing{background:#f6f1fe;border-color:var(--distributing);color:var(--distributing)}
.role-choice.sel.Repping{background:#e9f5ee;border-color:var(--repping);color:var(--repping)}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.info-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
.info-cell .k{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);font-weight:700;margin-bottom:4px}
.info-cell .v{font-weight:600;font-size:15px}
.block{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:var(--shadow)}
.block h3{font-size:16px;font-weight:700;margin-bottom:14px;letter-spacing:-.2px}
.csi-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;
  margin-bottom:8px;cursor:pointer;transition:.12s}
.csi-link:hover{background:var(--surface2);border-color:var(--border2)}
.csi-link .num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.csi-link .nm{font-weight:600;font-size:14px}
.csi-link .ch{margin-left:auto;color:var(--text4)}
.who-group{margin-bottom:16px}
.who-group:last-child{margin-bottom:0}
.who-group .gh{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13px;font-weight:700}
.who-person{display:flex;align-items:center;gap:10px;padding:7px 0}
.who-person .nm{font-weight:600;font-size:14px}
.who-person .co{color:var(--text3);font-size:13px}
.tracker-item{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:14px}

/* ============ CSI HUB ============ */
.hub-banner{background:var(--accent);color:#fff;border-radius:16px;padding:30px;margin-bottom:22px}
.hub-banner .num{font-family:'JetBrains Mono',monospace;font-size:15px;opacity:.7;font-weight:600}
.hub-banner h1{font-size:32px;font-weight:800;letter-spacing:-.6px;margin:6px 0 10px}
.hub-banner p{color:rgba(255,255,255,.78);font-size:15px;max-width:560px;line-height:1.5}
.hub-stats{display:flex;gap:32px;margin-top:20px}
.hub-stats .s .n{font-size:26px;font-weight:900}
.hub-stats .s .l{font-size:12.5px;opacity:.7;font-weight:500}
.hub-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
.rep-card{display:flex;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:.12s;background:var(--surface)}
.rep-card:hover{border-color:var(--border2);background:var(--surface2)}
.rep-card.pro{border-color:var(--pro-border);background:var(--pro-bg)}
.rep-logo{width:42px;height:42px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.rep-card .nm{font-weight:700;font-size:14.5px;line-height:1.2}
.rep-card .ter{color:var(--text3);font-size:12.5px;margin-top:2px}
.csi-index-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.csi-index-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;
  box-shadow:var(--shadow);transition:.15s}
.csi-index-card:hover{border-color:var(--border2);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.csi-index-card .num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:var(--pro)}
.csi-index-card .nm{font-weight:700;font-size:16px;margin:6px 0 10px;letter-spacing:-.2px}
.csi-index-card .ct{font-size:13px;color:var(--text3)}

/* ============ COMPANY ============ */
.co-row{display:flex;align-items:center;gap:14px;padding:15px;border:1px solid var(--border);border-radius:12px;
  margin-bottom:12px;cursor:pointer;background:var(--surface);box-shadow:var(--shadow);transition:.15s}
.co-row:hover{border-color:var(--border2);box-shadow:var(--shadow-lg)}
.co-logo{width:52px;height:52px;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.co-row .nm{font-weight:700;font-size:16px}
.co-row .ty{color:var(--text3);font-size:13px;margin-top:2px}
.co-row .ch{margin-left:auto;color:var(--text4)}
.co-banner{height:120px;border-radius:16px 16px 0 0;background:linear-gradient(120deg,#0f0f0f,#3d3d3d)}
.co-detail-head{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px;
  padding:0 26px 24px;margin-bottom:22px;box-shadow:var(--shadow);position:relative}
.co-detail-logo{width:80px;height:80px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;

  {name:'IAB Transit Lounge HNL Airport Renovation',location:'Honolulu, HI',owner:'HDOT Airports',architect:'Ushijima Architects',gc:'',bid_date:'2026-05-14',est_value:'$1M–$3M',type:'Public',csi_sections:['07 92 00'],description:'Renovation of the IAB transit lounge at Honolulu International Airport. Architect Ushijima Architects. Joint sealant scope. Bid date has passed.',dodge:'202600145744',contact:'HDOT Airports Division',verified:true}
];
const SEED_COMPANIES = [
  {name:'Pacific Rim Division 7 Solutions',abbr:'PRD7S',type:'Manufacturer Rep',territory:'Hawaii, Guam, Pacific Northwest, Alaska',csi_sections:['07 11 00','07 13 00','07 14 00','07 19 00','07 21 00','07 25 00','07 27 00','07 50 00','07 52 00','07 54 00','07 56 00','07 81 00','07 84 00','07 90 00','07 92 00'],lines:['Johns Manville','PROSOCO','ChemLink','AVM Industries','Monokote/GCP','Everest Systems','Palisade'],website:'PRD7Solutions.com',pro:true}
];

/* ---------- STATE ---------- */
const S = {
  user:null, profile:null, projects:[], companies:[],
  trackers:{}, presence:{}, myTracks:new Set(), myRoles:{},
  route:{view:'feed',id:null}, filter:'all', search:'',
  loading:true, configured:CONFIGURED
};

/* ---------- HELPERS ---------- */
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const initials = n => (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
function daysUntil(d){ if(!d) return null; const t=new Date(d+'T00:00:00'); const now=new Date(); now.setHours(0,0,0,0); return Math.round((t-now)/86400000); }
function bidPill(d){
  const n=daysUntil(d);
  if(n===null) return {cls:'neutral',txt:'No bid date'};
  if(n<0) return {cls:'neutral',txt:'Bid closed'};
  if(n<=3) return {cls:'urgent',txt:n===0?'Bids due today':`${n} day${n>1?'s':''} left`};
  if(n<=10) return {cls:'warn',txt:`${n} days left`};
  return {cls:'ok',txt:fmtDate(d)};
}
function fmtDate(d){ if(!d) return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
const roleClass = {Bidding:'b',Speccing:'s',Distributing:'d',Repping:'r'};

/* ---------- TOAST ---------- */
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast '+(type||'');
  el.textContent=msg;
  $('#toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},2600);
}

/* ============================================================
   DATA LAYER
   ============================================================ */
async function loadAll(){
  S.loading=true; render();
  try{
    await ensureSeed();
    const [pr,co] = await Promise.all([
      sb.from('projects').select('*').order('created_at',{ascending:false}),
      sb.from('companies').select('*').order('created_at',{ascending:false})
    ]);
    if(pr.error) throw pr.error;
    if(co.error) throw co.error;
    S.projects = pr.data||[];
    S.companies = co.data||[];
    await loadSocial();
  }catch(e){
    console.error(e); toast('Could not load data: '+(e.message||e),'err');
  }
  S.loading=false; render();
}

async function ensureSeed(){
  try{
    const {count} = await sb.from('projects').select('*',{count:'exact',head:true});
    if(count===0){
      const rows = SEED_PROJECTS.map(p=>({...p, posted_by:null}));
      const r = await sb.from('projects').insert(rows);
      if(r.error) console.warn('seed projects',r.error.message);
    }
    const {count:cc} = await sb.from('companies').select('*',{count:'exact',head:true});
    if(cc===0){
      const r = await sb.from('companies').insert(SEED_COMPANIES);
      if(r.error) console.warn('seed companies',r.error.message);
    }
  }catch(e){ console.warn('seed check failed',e.message); }
}

async function loadSocial(){
  try{
    const [tr,pre] = await Promise.all([
      sb.from('project_trackers').select('*'),
      sb.from('project_presence').select('*')
    ]);
    S.trackers={}; S.presence={}; S.myTracks=new Set(); S.myRoles={};
    (tr.data||[]).forEach(t=>{
      (S.trackers[t.project_id]=S.trackers[t.project_id]||[]).push(t);
      if(S.user && t.user_id===S.user.id) S.myTracks.add(t.project_id);
    });
    (pre.data||[]).forEach(p=>{
      (S.presence[p.project_id]=S.presence[p.project_id]||[]).push(p);
      if(S.user && p.user_id===S.user.id) S.myRoles[p.project_id]=p;
    });
  }catch(e){ console.warn('social load',e.message); }
}

/* ---------- TRACK / ROLE ACTIONS ---------- */
async function toggleTrack(pid){
  if(!S.user){ go('signin'); return; }
  const tracking = S.myTracks.has(pid);
  try{
    if(tracking){
      const r=await sb.from('project_trackers').delete().eq('project_id',pid).eq('user_id',S.user.id);
      if(r.error) throw r.error;
      S.myTracks.delete(pid);
      S.trackers[pid]=(S.trackers[pid]||[]).filter(t=>t.user_id!==S.user.id);
      toast('Removed from watchlist');
    }else{
      const row={project_id:pid,user_id:S.user.id,user_name:S.profile?.name||'You'};
      const r=await sb.from('project_trackers').insert(row).select();
      if(r.error) throw r.error;
      S.myTracks.add(pid);
      (S.trackers[pid]=S.trackers[pid]||[]).push(r.data[0]);
      toast('Added to watchlist','ok');
    }
  }catch(e){ toast('Action failed: '+(e.message||e),'err'); }
  render();
}

async function setRole(pid,role){
  if(!S.user){ go('signin'); return; }
  try{
    const existing=S.myRoles[pid];
    if(existing && existing.role===role){ return removeRole(pid); }
    if(existing){
      const r=await sb.from('project_presence').update({role}).eq('id',existing.id).select();
      if(r.error) throw r.error;
      S.myRoles[pid]=r.data[0];
      S.presence[pid]=(S.presence[pid]||[]).map(p=>p.id===existing.id?r.data[0]:p);
    }else{
      const row={project_id:pid,user_id:S.user.id,user_name:S.profile?.name||'You',
        user_company:S.profile?.company||'',role};
      const r=await sb.from('project_presence').insert(row).select();
      if(r.error) throw r.error;
      S.myRoles[pid]=r.data[0];
      (S.presence[pid]=S.presence[pid]||[]).push(r.data[0]);
    }
    toast('Role set: '+role,'ok');
  }catch(e){ toast('Could not set role: '+(e.message||e),'err'); }
  render();
}
async function removeRole(pid){
  const existing=S.myRoles[pid]; if(!existing) return;
  try{
    const r=await sb.from('project_presence').delete().eq('id',existing.id);
    if(r.error) throw r.error;
    delete S.myRoles[pid];
    S.presence[pid]=(S.presence[pid]||[]).filter(p=>p.id!==existing.id);
    toast('Role removed');
  }catch(e){ toast('Action failed: '+(e.message||e),'err'); }
  render();
}

/* ---------- POST PROJECT ---------- */
async function postProject(data){
  try{
    const row={...data, posted_by:S.user.id, verified:false};
    const r=await sb.from('projects').insert(row).select();
    if(r.error) throw r.error;
    S.projects.unshift(r.data[0]);
    toast('Project posted','ok');
    closeModal(); render();
  }catch(e){ toast('Could not post: '+(e.message||e),'err'); }
}
async function addCompany(data){
  try{
    const r=await sb.from('companies').insert({...data,pro:false}).select();
    if(r.error) throw r.error;
    S.companies.unshift(r.data[0]);
    toast('Company added','ok'); closeModal(); render();
  }catch(e){ toast('Could not add: '+(e.message||e),'err'); }
}

/* ============================================================
   AUTH
   ============================================================ */
async function initAuth(){
  if(!CONFIGURED) return;
  const {data} = await sb.auth.getSession();
  if(data.session){ S.user=data.session.user; await afterAuth(); }
  sb.auth.onAuthStateChange(async (_e,session)=>{
    const was = S.user?.id;
    S.user = session?.user || null;
    if(S.user && S.user.id!==was){ await afterAuth(); }
    else if(!S.user){ S.profile=null; render(); }
  });
}
async function afterAuth(){
  try{
    const {data,error}=await sb.from('profiles').select('*').eq('id',S.user.id).maybeSingle();
    if(error) throw error;
    S.profile=data;
    await loadSocial();
    if(!data){ S.route={view:'onboarding'}; }
    else if(S.route.view==='signin'||S.route.view==='signup'){ S.route={view:'feed'}; }
    render();
  }catch(e){ console.warn(e); render(); }
}
async function signInEmail(email,pw){
  try{ const r=await sb.auth.signInWithPassword({email,password:pw}); if(r.error) throw r.error; toast('Signed in','ok'); }
  catch(e){ toast(e.message||'Sign in failed','err'); }
}
async function signUpEmail(email,pw){
  try{
    const r=await sb.auth.signUp({email,password:pw});
    if(r.error) throw r.error;
    if(r.data.session) toast('Account created','ok');
    else toast('Check your email to confirm your account','ok');
  }catch(e){ toast(e.message||'Sign up failed','err'); }
}
async function signInGoogle(){
  try{ const r=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.href}}); if(r.error) throw r.error; }
  catch(e){ toast(e.message||'Google sign-in failed','err'); }
}
async function signOut(){
  try{ await sb.auth.signOut(); S.user=null; S.profile=null; go('feed'); toast('Signed out'); }
  catch(e){ toast('Sign out failed','err'); }
}
async function saveProfile(p){
  try{
    const row={id:S.user.id,...p};
    const r=await sb.from('profiles').upsert(row).select().single();
    if(r.error) throw r.error;
    S.profile=r.data;
    toast('Profile saved','ok'); go('feed');
  }catch(e){ toast('Could not save: '+(e.message||e),'err'); }
}

/* ---------- REALTIME ---------- */
function initRealtime(){
  if(!CONFIGURED) return;
  sb.channel('projects-feed')
    .on('postgres_changes',{event:'*',schema:'public',table:'projects'},payload=>{
      if(payload.eventType==='INSERT'){
        if(!S.projects.find(p=>p.id===payload.new.id)){ S.projects.unshift(payload.new); render(); }
      }else if(payload.eventType==='UPDATE'){
        S.projects=S.projects.map(p=>p.id===payload.new.id?payload.new:p); render();
      }else if(payload.eventType==='DELETE'){
        S.projects=S.projects.filter(p=>p.id!==payload.old.id); render();
      }
    })
    .subscribe();
  sb.channel('social-feed')
    .on('postgres_changes',{event:'*',schema:'public',table:'project_trackers'},()=>{ loadSocial().then(render); })
    .on('postgres_changes',{event:'*',schema:'public',table:'project_presence'},()=>{ loadSocial().then(render); })
    .subscribe();
}

/* ============================================================
   ROUTING
   ============================================================ */
function go(view,id=null){ S.route={view,id}; window.scrollTo(0,0); render(); }

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  if(!CONFIGURED){ $('#root').innerHTML=setupView(); $('#botnav-root').innerHTML=''; return; }
  const v=S.route.view;
  let html='';
  const showNav = v!=='signin'&&v!=='signup'&&v!=='onboarding'&&v!=='landing';
  if(showNav) html+=topNav();
  switch(v){
    case 'landing': html+=landingView(); break;
    case 'feed': html+=feedView(); break;
    case 'project': html+=projectView(S.route.id); break;
    case 'csi': html+=csiView(S.route.id); break;
    case 'companies': html+=companiesView(); break;
    case 'company': html+=companyView(S.route.id); break;
    case 'profile': html+=profileView(); break;
    case 'signin': html+=authView(false); break;
    case 'signup': html+=authView(true); break;
    case 'onboarding': html+=onboardingView(); break;
    default: html+=feedView();
  }
  $('#root').innerHTML=html;
  $('#botnav-root').innerHTML = showNav ? bottomNav() : '';
  wire();
}

function filteredProjects(){
  let list=S.projects.slice();
  const f=S.filter;
  if(f==='soon') list=list.filter(p=>{const n=daysUntil(p.bid_date);return n!==null&&n>=0&&n<=10;});
  else if(f==='Public') list=list.filter(p=>p.type==='Public');
  else if(f==='Federal') list=list.filter(p=>p.type==='Federal');
  else if(f==='Private') list=list.filter(p=>p.type==='Private');
  else if(f==='watch') list=list.filter(p=>S.myTracks.has(p.id));
  if(S.search){
    const q=S.search.toLowerCase();
    list=list.filter(p=>(p.name+' '+p.location+' '+(p.gc||'')+' '+(p.owner||'')+' '+(p.architect||'')+' '+(p.csi_sections||[]).join(' ')+' '+(p.dodge||'')).toLowerCase().includes(q));
  }
  list.sort((a,b)=>{
    const na=daysUntil(a.bid_date), nb=daysUntil(b.bid_date);
    const va=(na===null||na<0)?99999:na, vb=(nb===null||nb<0)?99999:nb;
    return va-vb;
  });
  return list;
}
function feedView(){
  if(S.loading) return `<div class="page feed-layout"><div class="main-col">${skel()}${skel()}${skel()}</div></div>`;
  const list=filteredProjects();
  const chip=(k,l,show=true)=> show?`<button class="chip ${S.filter===k?'active':''}" data-filter="${k}">${l}</button>`:'';
  return `<div class="page feed-layout">

/* ============================================================
   EVENT WIRING
   ============================================================ */
function wire(){
  document.querySelectorAll('[data-go]').forEach(el=>el.onclick=e=>{e.stopPropagation();go(el.dataset.go);});
  document.querySelectorAll('[data-proj]').forEach(el=>el.onclick=e=>{
    if(e.target.closest('[data-track]')) return;
    go('project',isNaN(el.dataset.proj)?el.dataset.proj:Number(el.dataset.proj));
  });
  document.querySelectorAll('[data-track]').forEach(el=>el.onclick=e=>{e.stopPropagation();toggleTrack(idval(el.dataset.track));});
  document.querySelectorAll('[data-csi]').forEach(el=>el.onclick=e=>{e.stopPropagation();go('csi',el.dataset.csi);});
  document.querySelectorAll('[data-company]').forEach(el=>el.onclick=e=>{e.stopPropagation();go('company',idval(el.dataset.company));});
  document.querySelectorAll('[data-role]').forEach(el=>el.onclick=()=>{const[pid,r]=el.dataset.role.split('|');setRole(idval(pid),r);});
  document.querySelectorAll('[data-removerole]').forEach(el=>el.onclick=()=>removeRole(idval(el.dataset.removerole)));
  document.querySelectorAll('[data-filter]').forEach(el=>el.onclick=()=>{S.filter=el.dataset.filter;render();});
  document.querySelectorAll('[data-empty]').forEach(el=>el.onclick=()=>{
    const a=el.dataset.empty,arg=el.dataset.arg;
    if(a==='feed'){go('feed');if(arg)S.filter=arg;render();}
    else if(a==='clearsearch'){S.search='';render();}
    else if(a==='addco'){openAddCoModal();}
    else if(a==='companies'){go('companies');}
  });
  const ns=$('#navsearch');
  if(ns){ ns.oninput=()=>{S.search=ns.value;if(S.route.view!=='feed'){S.route={view:'feed'};}renderFeedOnly();}; }
  const pb=$('#postBtn'); if(pb) pb.onclick=()=>S.user?openPostModal():go('signin');
  const ab=$('#addCoBtn'); if(ab) ab.onclick=openAddCoModal;
  const ep=$('#editProfBtn'); if(ep) ep.onclick=openEditProfModal;
  const so=$('#signOutBtn'); if(so) so.onclick=signOut;
  const gb=$('#googleBtn'); if(gb) gb.onclick=signInGoogle;
  const af=$('#authForm'); if(af) af.onsubmit=e=>{e.preventDefault();
    const em=$('#authEmail').value,pw=$('#authPw').value;
    S.route.view==='signup'?signUpEmail(em,pw):signInEmail(em,pw);
  };
  const onb=$('#onbForm'); if(onb) onb.onsubmit=e=>{e.preventDefault();
    saveProfile({name:$('#onbName').value,company:$('#onbCompany').value,role:$('#onbRole').value,location:$('#onbLocation').value});
  };
}
function idval(v){ return isNaN(v)?v:Number(v); }
function renderFeedOnly(){
  // light re-render keeping search focus
  const main=document.querySelector('.main-col');
  if(!main){ render(); return; }
  const list=filteredProjects();
  const cards=main.querySelectorAll('.proj-card, .empty');
  // simplest: rerender feed body region
  render();
  const ns=$('#navsearch'); if(ns){ ns.focus(); ns.setSelectionRange(ns.value.length,ns.value.length); }
}
function wireModal(){
  document.querySelectorAll('[data-modalback]').forEach(el=>el.onclick=e=>{if(e.target===el||el.classList.contains('modal-x'))closeModal();});
  const pf=$('#postForm'); if(pf) pf.onsubmit=e=>{e.preventDefault();
    postProject({
      name:$('#pf_name').value,location:$('#pf_location').value,bid_date:$('#pf_bid').value||null,
      est_value:$('#pf_value').value||'TBD',type:$('#pf_type').value,owner:$('#pf_owner').value,
      architect:$('#pf_arch').value,gc:$('#pf_gc').value,dodge:$('#pf_dodge').value,
      csi_sections:parseCsi($('#pf_csi').value),contact:$('#pf_contact').value,description:$('#pf_desc').value
    });
  };
  const cf=$('#coForm'); if(cf) cf.onsubmit=e=>{e.preventDefault();
    addCompany({
      name:$('#cf_name').value,abbr:$('#cf_abbr').value||initials($('#cf_name').value),type:$('#cf_type').value,
      territory:$('#cf_ter').value,website:$('#cf_web').value,
      csi_sections:parseCsi($('#cf_csi').value),lines:$('#cf_lines').value.split(',').map(s=>s.trim()).filter(Boolean)
    });
  };
  const ef=$('#editForm'); if(ef) ef.onsubmit=e=>{e.preventDefault();
    saveProfileStay({name:$('#ef_name').value,company:$('#ef_company').value,role:$('#ef_role').value,location:$('#ef_location').value});
  };
}
function parseCsi(str){ return (str||'').split(',').map(s=>s.trim()).filter(Boolean); }
async function saveProfileStay(p){
  try{
    const r=await sb.from('profiles').upsert({id:S.user.id,...p}).select().single();
    if(r.error) throw r.error;
    S.profile=r.data; toast('Profile updated','ok'); closeModal(); render();
  }catch(e){ toast('Could not save: '+(e.message||e),'err'); }
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  if(!CONFIGURED){ render(); return; }
  // first-time visitors land on the marketing page
  S.route={view:'landing'};
  render();
  await initAuth();
  initRealtime();
  await loadAll();
  // if user came in signed-out and still on landing, keep landing; else feed handled in afterAuth
  render();
}
boot();
</script>
</body>
</html>
